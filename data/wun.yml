    en: 
      name: "Woody"
      title: "Waiting for a Friend"
      flavour: "\"Starin’ over the jungle from this huge vine\nI think back to when I was laughin’ and feelin’ fine\nMy friends were all around to welcome me back home\nBut now I’m lost in Lorcana and oh so alone\""
    fr: 
      name: "Woody"
      title: "Attend un ami"
      flavour: "“Contemplant la jungle du haut de cette plante géante\nJe repense à cette époque pleine de rire et si exaltante\nDe retour à la maison, mes amis étaient tous là\nMaintenant me voici, seul, perdu dans Lorcana.”"
    it: 
      name: "Woody"
      title: "In Attesa di un Amico"
      flavour: "“Osservando la giungla da questo viticcio gigante\nRipenso a quando, felice e sorridente\nA casa gli amici mi accoglievan con affetto\nMa ora son perso a Lorcana e sono oh, così soletto”"
    de: 
      name: "Woody"
      title: "Wartet auf einen Freund"
      flavour: "„Ich blicke auf den Dschungel, von dieser Ranke aus\nUnd denke an die schöne vergang'ne Zeit Zuhaus\nWo meine Freunde mit mir lebten, fühlt' ich mich daheim\nDoch jetzt bin ich verloren in Lorcana und allein“"
